<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Conflict Tracker - Llistat</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f9f9f9; }
    h2 { color: #333; }
    table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #007bff; color: white; }
    tr:hover { background-color: #f1f1f1; }
    .btn-new {
        display: inline-block; background: #28a745; color: white;
        padding: 10px 20px; text-decoration: none; border-radius: 4px; margin-bottom: 20px;
    }
    .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 0.9em; }
    .status-active { background: #d4edda; color: #155724; }
    .status-frozen { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>

<h2>🌍 Seguiment de Conflictes Globals</h2>

<a th:href="@{/web/conflicts/new}" class="btn-new">+ Afegir Nou Conflicte</a>

<table>
  <thead>
  <tr>
    <th>Nom</th>
    <th>Data d'Inici</th>
    <th>Estat</th>
    <th>Descripció Curta</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="c : ${conflicts}">
    <td th:text="${c.name}" style="font-weight: bold;">Nom</td>
    <td th:text="${c.startDate}">01/01/2026</td>
    <td>
                    <span th:text="${c.status}"
                          th:classappend="${c.status.toString() == 'ACTIVE' ? 'status status-active' : 'status status-frozen'}">
                    </span>
    </td>
    <td th:text="${c.description != null && c.description.length() > 50 ? #strings.substring(c.description,0,50) + '...' : c.description}">
      Descripció...
    </td>
  </tr>
  <tr th:if="${#lists.isEmpty(conflicts)}">
    <td colspan="4" style="text-align: center; color: #999;">No hi ha conflictes registrats.</td>
  </tr>
  </tbody>
</table>

</body>
</html>
