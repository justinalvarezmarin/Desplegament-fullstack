<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Conflict Tracker - Nou Conflicte</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f9f9f9; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }
        .btn-save { background-color: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-save:hover { background-color: #218838; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Registrar Nou Conflicte</h2>

    <form th:action="@{/web/conflicts/save}" th:object="${conflict}" method="post">

        <div class="form-group">
            <label>Nom del Conflicte:</label>
            <input type="text" th:field="*{name}" placeholder="Ex: Guerra Civil..." required />
        </div>

        <div class="form-group">
            <label>Descripció:</label>
            <textarea th:field="*{description}" placeholder="Breu resum dels fets..."></textarea>
        </div>

        <div class="form-group">
            <label>Data d'Inici:</label>
            <input type="date" th:field="*{startDate}" required />
        </div>

        <div class="form-group">
            <label>Estat Actual:</label>
            <select th:field="*{status}">
                <option th:value="ACTIVE">Actiu</option>
                <option th:value="FROZEN">Congelat</option>
                <option th:value="ENDED">Finalitzat</option>
            </select>
        </div>

        <button type="submit" class="btn-save">Desar Conflicte</button>
    </form>

    <a class="back-link" th:href="@{/web/conflicts}">⬅ Tornar al llistat</a>
</div>

</body>
</html>
